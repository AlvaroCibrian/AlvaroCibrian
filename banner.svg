<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    .pf { font-family: 'Press Start 2P', 'Courier New', monospace; }
    .title { font-size: 22px; fill: #e8d5a3; }
    .sub   { font-size: 10px; fill: #7ec8a0; }
    .tag   { font-size: 8px;  fill: #8ab4c9; }
    .dim   { font-size: 7px;  fill: #5a7a6a; }
    @keyframes blink  { 50% { opacity:0; } }
    @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes glow   { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes pulse  { 0%,100%{opacity:.7} 50%{opacity:1} }
    .frog  { animation: float 3.2s ease-in-out infinite; transform-origin:110px 160px; }
    .s1    { animation: glow 1.4s ease-in-out infinite; }
    .s2    { animation: glow 1.4s ease-in-out infinite .5s; }
    .s3    { animation: glow 1.4s ease-in-out infinite 1s; }
    .cur   { animation: blink 1s step-end infinite; }
    .orb   { animation: pulse 2.5s ease-in-out infinite; }
  </style>
</defs>

